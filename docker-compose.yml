# =============================================================================
# dc_real_time — Docker Compose
# =============================================================================
# 5 services: fetcher (live data), api (FastAPI), redis (feature store),
# trainer (retrain on demand), nginx (reverse proxy).
#
# Usage:
#   docker compose up -d              # start all services
#   docker compose logs -f fetcher    # tail fetcher logs
#   docker compose down               # stop everything
#   docker compose restart api        # reload models after symlink swap
#
# Models, data, artifacts, and source code are mounted as volumes from the
# host so containers read/write the same files and pick up code changes live.
# =============================================================================

services:
  # ---- Redis: online feature store + cache ----
  redis:
    image: redis:7-alpine
    container_name: dc_real_time_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    networks:
      - dc_net

  # ---- API: FastAPI service (D1 + D8 will fill in) ----
  api:
    build: .
    image: dc_real_time_api:v0.1
    container_name: dc_real_time_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - MODEL_VERSION=v0.1
      - LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      # Mount models and data from the host so the container sees the same files
      - ./models:/app/models
      - ./data:/app/data:ro
      - ./artifacts:/app/artifacts
      # Frontend (D11)
      - ./web:/app/web:ro
      # Live code reload (D13)
      - ./src:/app/src
    networks:
      - dc_net

  # ---- API Canary: green deployment for weight-based canary (D9) ----
  # Runs the same image but tagged as green in nginx split_clients.
  # Uses champion model by default; override MODELS_DIR to test a candidate.
  api_canary:
    build: .
    image: dc_real_time_api:v0.1
    container_name: dc_real_time_api_canary
    restart: unless-stopped
    # No host port — accessed internally via nginx only
    environment:
      - REDIS_URL=redis://redis:6379
      - MODEL_VERSION=v0.1
      - LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
      - MODELS_DIR=/app/models/champion
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./models:/app/models
      - ./data:/app/data:ro
      - ./artifacts:/app/artifacts
      - ./web:/app/web:ro
      - ./src:/app/src
    networks:
      - dc_net

  # ---- Trainer: cron-driven retraining (D3 + D5) ----
  # Run with: docker compose run --rm trainer
  # Or in cron: docker compose exec trainer python -m src.models.retrain_scheduler
  trainer:
    image: dc_real_time_api:v0.1
    container_name: dc_real_time_trainer
    # Don't auto-restart — trainer is run on demand via docker compose run
    restart: "no"
    environment:
      - REDIS_URL=redis://redis:6379
      - MODEL_VERSION=v0.1
      - LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
      - AUTO_PROMOTE=0
      - RETRAIN_MAX_AGE_DAYS=7
      - DRIFT_PSI_THRESHOLD=0.2
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./models:/app/models
      - ./data:/app/data:ro
      - ./artifacts:/app/artifacts
      # Live code reload (D13)
      - ./src:/app/src
    # Default: just sleep so container stays alive for `docker compose exec`
    command: ["sleep", "infinity"]
    profiles: ["cron"]  # only starts with --profile cron
    # Override image HEALTHCHECK (which probes :8000 — wrong for sleep infinity)
    # The python:3.11-slim image doesn't include pgrep/procps, so we test
    # what we actually care about: that the trainer can reach Redis.
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os,redis; r=redis.from_url(os.environ.get('REDIS_URL','redis://redis:6379')); r.ping()\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - dc_net

  # ---- Fetcher: continuous live data ingestion (D8 full) ----
  # Runs live_fetcher in --loop mode, refreshing Redis every 5 min.
  # Without this service, DC forecasts return 404 and zone forecasts
  # fall back to stale data.
  fetcher:
    build: .
    image: dc_real_time_api:v0.1
    container_name: dc_real_time_fetcher
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379
      - LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
      - PROJECT_ROOT=/app
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./models:/app/models
      - ./data:/app/data:ro
      - ./src:/app/src
    command: ["python", "-m", "src.data.live_fetcher", "--loop"]
    # Override image HEALTHCHECK (which probes :8000 — wrong for fetcher)
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os,redis; r=redis.from_url(os.environ.get('REDIS_URL','redis://redis:6379')); r.ping()\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - dc_net

  # ---- Drift Detector: monitors feature drift, writes drift_log.json (D10) ----
  # Runs every 60 min, compares current LMP distributions (from Redis)
  # against training reference. Triggers retrain when PSI > threshold.
  drift_detector:
    build: .
    image: dc_real_time_api:v0.1
    container_name: dc_real_time_drift
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379
      - LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
      - DRIFT_PSI_THRESHOLD=0.2
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./models:/app/models
      - ./data:/app/data:ro
      - ./artifacts:/app/artifacts
      - ./src:/app/src
    command: ["python", "-m", "src.monitoring.drift_detector", "--loop", "--interval", "3600"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os,redis; r=redis.from_url(os.environ.get('REDIS_URL','redis://redis:6379')); r.ping()\" || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - dc_net

  # ---- Nginx: blue/green + canary reverse proxy (D4 + D7) ----
  nginx:
    image: nginx:1.27-alpine
    container_name: dc_real_time_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Mount our own conf.d/ over the image's conf.d/. The image's
      # default.conf has a server{} block listening on :80 that conflicts
      # with ours (causes 502s). Our conf.d/ has only a stub.
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      api:
        condition: service_healthy
      api_canary:
        condition: service_healthy
    networks:
      - dc_net
    healthcheck:
      # Use 127.0.0.1 explicitly: Alpine's wget resolves localhost to ::1
      # first, but the listen socket may not bind IPv6 in all kernels —
      # leading to "Connection refused" on what is otherwise a healthy proxy.
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/nginx-health || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3

networks:
  dc_net:
    driver: bridge

volumes:
  redis_data:
    name: dc_real_time_redis_data
