user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'upstream=$upstream_addr time=$upstream_response_time';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    # Docker DNS resolver — re-resolves upstream IPs on each request
    # (avoids 502s when API containers restart and get new IPs).
    resolver 127.0.0.11 valid=10s;

    # ===== Upstreams =====
    # Blue: production (champion model)
    upstream dc_api_blue {
        server api:8000 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    # Green: canary (candidate model — runs separate container)
    upstream dc_api_green {
        server api_canary:8000 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    # Weight-based split: 95% blue, 5% green (keyed by client IP for consistency)
    split_clients "${remote_addr}" $backend {
        5%     dc_api_green;
        *      dc_api_blue;
    }

    # ===== Server =====
    server {
        listen 80;
        server_name _;

        # Nginx itself health endpoint
        location = /nginx-health {
            access_log off;
            return 200 "ok\n";
        }

        # Default route — weight-based split to blue (95%) or green (5%)
        location / {
            proxy_pass http://$backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_read_timeout 30s;
            proxy_next_upstream error timeout http_502 http_503;
            if ($backend = "dc_api_green") {
                add_header X-Canary "green" always;
            }
        }
    }
}
