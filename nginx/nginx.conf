user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'upstream=$upstream_addr time=$upstream_response_time';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    # ===== Upstreams =====
    # Same upstream (api:8000) for both blue and green — blue/green
    # is decided at the proxy_pass level, not the upstream. This
    # keeps the config simple and avoids the "weight=0 is invalid" trap.
    # In production with two different model versions, you'd point these
    # at different service names. We use model-promotion via symlink swap
    # instead, so a single upstream is fine.
    upstream dc_api {
        server api:8000 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    # ===== Server =====
    server {
        listen 80;
        server_name _;

        # Nginx itself health endpoint
        location = /nginx-health {
            access_log off;
            return 200 "ok\n";
        }

        # Default route → blue (production)
        location / {
            proxy_pass http://dc_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_read_timeout 30s;
            proxy_next_upstream error timeout http_502 http_503;
        }

        # Canary route — same backend, but tagged in logs as "canary"
        # Used for testing new model versions with manual traffic.
        # For automatic 5% canary, set up a separate canary service.
        # Note: trailing slash on proxy_pass strips /canary prefix.
        location /canary/ {
            proxy_pass http://dc_api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_read_timeout 30s;
            # Tag canary requests in logs
            add_header X-Canary "green" always;
        }
    }
}
